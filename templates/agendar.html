{% extends "_layout.html" %}
{% block title %}Agendar Entrega - {{ APP_NAME }}{% endblock %}

{% block header %}
  <h2 style="margin:0;">Agendar entrega</h2>
{% endblock %}

{% block actions %}
  <a class="btn" href="/pedido/{{ o['id'] }}">Volver al pedido</a>
{% endblock %}

{% block content %}
  <div class="card">

    <form method="post" action="/pedido/{{ o['id'] }}/agendar"
          style="display:grid; gap:14px; max-width:400px;">

      <div>
        <label style="font-weight:700;">Fecha</label>
        <input type="date" name="fecha" required
               style="width:100%; padding:10px; border-radius:10px; border:1px solid #2a2a2a;
                      background:#0f0f0f; color:#f5f5f5;">
      </div>

      <div>
        <label style="font-weight:700;">Turno</label>
        <select name="turno"
                style="width:100%; padding:10px; border-radius:10px; border:1px solid #2a2a2a;
                       background:#0f0f0f; color:#f5f5f5;">
          <option value="MANANA">Mañana</option>
          <option value="TARDE">Tarde</option>
        </select>
      </div>

      <button class="btn" type="submit">
        Confirmar entrega
      </button>

    </form>

  </div>
{% endblock %}
