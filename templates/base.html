<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ APP_NAME }}</title>
  <style>
    :root{
      --bg:#0b0b0f;
      --panel:#11121a;
      --panel2:#0f1016;
      --gold:#d6b15e;
      --gold2:#b88a2b;
      --text:#eaeaea;
      --muted:#b8b8b8;
      --line:#23243a;
    }
    *{box-sizing:border-box}
    body{
      margin:0; font-family: Arial, sans-serif;
      background: radial-gradient(1200px 600px at 20% 10%, rgba(214,177,94,.10), transparent 55%),
                  radial-gradient(1200px 600px at 80% 30%, rgba(214,177,94,.06), transparent 60%),
                  var(--bg);
      color:var(--text);
    }
    .shell{display:flex; min-height:100vh;}
    .side{
      width:240px; padding:18px 14px;
      background: linear-gradient(180deg, rgba(255,255,255,.03), transparent 30%), #07070b;
      border-right:1px solid var(--line);
      position:sticky; top:0; height:100vh;
    }
    .brand{display:flex; gap:10px; align-items:center; padding:10px 10px 14px;}
    .brand img{height:42px; width:auto; border-radius:8px; background:#fff;}
    .brand .t1{font-weight:700; color:var(--gold); letter-spacing:.5px;}
    .brand .t2{font-size:12px; color:var(--muted); margin-top:2px;}
    .nav{margin-top:10px;}
    .nav a{
      display:flex; align-items:center; gap:10px;
      padding:10px 12px; margin:6px 6px;
      border-radius:12px; text-decoration:none;
      color:var(--text); background:transparent;
      border:1px solid transparent;
    }
    .nav a:hover{border-color:rgba(214,177,94,.35); background:rgba(214,177,94,.07);}
    .nav .muted{color:var(--muted); font-size:12px; padding:10px 12px; margin:14px 6px 6px;}
    .main{flex:1; padding:22px 26px;}
    .top{
      display:flex; justify-content:space-between; align-items:center;
      margin-bottom:18px;
    }
    .pill{
      display:inline-flex; gap:10px; align-items:center;
      padding:10px 12px; border-radius:14px;
      background:rgba(255,255,255,.03); border:1px solid var(--line);
      color:var(--muted); font-size:13px;
    }
    .btn{
      background:linear-gradient(180deg,var(--gold),var(--gold2));
      border:none; color:#111; font-weight:700;
      padding:10px 14px; border-radius:12px; cursor:pointer;
    }
    .btn:active{transform:translateY(1px)}
    .card{
      background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
      border:1px solid var(--line);
      border-radius:18px; padding:16px;
      box-shadow: 0 10px 30px rgba(0,0,0,.25);
    }
    .grid{display:grid; gap:14px;}
    .grid.cols4{grid-template-columns:repeat(4,minmax(0,1fr));}
    @media (max-width:1100px){ .grid.cols4{grid-template-columns:repeat(2,minmax(0,1fr));} }
    @media (max-width:720px){
      .side{display:none;}
      .main{padding:18px;}
      .grid.cols4{grid-template-columns:1fr;}
    }
    .kpi .label{color:var(--muted); font-size:12px;}
    .kpi .val{font-size:22px; font-weight:800; margin-top:6px; color:#fff;}
    .kpi .val.gold{color:var(--gold);}
    .title{font-size:22px; font-weight:800; margin:0;}
    .sub{color:var(--muted); margin:6px 0 0; font-size:13px;}
  </style>
</head>
<body>
  <div class="shell">
    <aside class="side">
      <div class="brand">
        <img src="/static/logo.jpg" alt="LP">
        <div>
          <div class="t1">LP ERP</div>
          <div class="t2">{{ SLOGAN }}</div>
        </div>
      </div>

      <nav class="nav">
        <a href="/">Dashboard</a>
        <a href="/vendedor/nueva">Nueva venta</a>
        <a href="/admin/resumen">Reportes</a>
	<a href="/inventario">Inventario</a>
        <a href="/venta" class="nav-link {% if active=='venta' %}active{% endif %}">Venta</a>


        <div class="muted">Sesión</div>
        <a href="/logout">Cerrar sesión</a>
      </nav>
    </aside>

    <main class="main">
      <div class="top">
        <div>
          <p class="title">{% block page_title %}Panel{% endblock %}</p>
          <p class="sub">{% block page_subtitle %}{{ APP_NAME }}{% endblock %}</p>
        </div>
        <div class="pill">
          <span>Usuario: <b style="color:var(--text)">{{ user }}</b></span>
          <span>Rol: <b style="color:var(--gold)">{{ role }}</b></span>
        </div>
      </div>

      {% block content %}{% endblock %}
    </main>
  </div>
</body>
</html>
